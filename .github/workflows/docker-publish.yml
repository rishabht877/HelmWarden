name: Docker Publish

# Builds the operator image, scans it with Trivy, and (on main / version tags) publishes to GHCR.
# Layer + Trivy-DB caching keep the pipeline fast on repeat runs.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-scan-push:
    name: Build, scan, publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build image (loaded locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The Trivy vulnerability DB is hundreds of MB; caching it (not re-downloading every run) is
      # the main lever for a sub-3-minute pipeline.
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      # Install Trivy from its official script rather than the marketplace action: the action pins a
      # transitive setup-trivy sub-action whose tags drift, which broke resolution. This is stable.
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan image with Trivy
        env:
          IMAGE_REF: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        run: |
          trivy image --scanners vuln --ignore-unfixed --severity CRITICAL \
            --exit-code 1 --format table "$IMAGE_REF"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
